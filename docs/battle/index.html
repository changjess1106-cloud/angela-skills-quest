<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Battle</title>
</head>
<body>
<h1>Battle Arena</h1>
<div id="battles"></div>
<script>
fetch("../data/battles.json").then(r=>r.json()).then(data=>{
let html="<h2>Recent Battles</h2>";
data.slice(-10).forEach(b=>{
html+=b.agent1+" vs "+b.agent2+" winner:"+b.winner+"<br>";
});
document.getElementById("battles").innerHTML=html;
});
</script>
</body>
</html>
