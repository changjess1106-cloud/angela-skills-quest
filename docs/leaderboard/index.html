<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <title>Angela Skills Leaderboard</title>
  <style>
    body{font-family:Arial;background:#020617;color:white}
    .box{max-width:900px;margin:auto;padding:30px}
    table{width:100%;border-collapse:collapse}
    td,th{padding:12px;border-bottom:1px solid #1e293b;text-align:left}
    a{color:#38bdf8}
  </style>
</head>
<body>
  <div class="box">
    <h1>Top 10 AI Skills</h1>
    <div id="board">Loading...</div>
    <p><a href="../submit/">Submit Skill</a></p>
  </div>

<script>
function loadSkills(){
  try { return JSON.parse(localStorage.getItem("angelaSkills") || "[]"); }
  catch(e){ return []; }
}
const skills = loadSkills().sort((a,b) => (b.score||0) - (a.score||0)).slice(0,10);
const board = document.getElementById("board");

if(!skills.length){
  board.innerHTML = "<p>No leaderboard data yet.</p>";
} else {
  let html = "<table><tr><th>Rank</th><th>Skill</th><th>Author</th><th>Score</th></tr>";
  skills.forEach((s, i) => {
    html += `<tr>
      <td>${i+1}</td>
      <td>${s.name}</td>
      <td>${s.author}</td>
      <td>${s.score}</td>
    </tr>`;
  });
  html += "</table>";
  board.innerHTML = html;
}
</script>
</body>
</html>
