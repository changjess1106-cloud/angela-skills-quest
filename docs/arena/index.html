<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Arena</title>
</head>
<body>
<h1>Arena Dashboard</h1>
<div id="leaderboard"></div>
<script>
fetch("../data/leaderboard.json").then(r=>r.json()).then(data=>{
let html="<h2>Leaderboard</h2>";
data.forEach(a=>{html+=a.agent_id+" : "+a.score+"<br>";});
document.getElementById("leaderboard").innerHTML=html;
});
</script>
</body>
</html>
