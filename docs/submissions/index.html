<!DOCTYPE html>
<html lang="zh-Hant">
<head>
  <meta charset="UTF-8">
  <title>Skill Submissions</title>
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <style>
    body{font-family:Arial;background:#020617;color:white;padding:30px;margin:0}
    .card{max-width:1000px;margin:auto;background:#0f172a;padding:24px;border-radius:14px}
    table{width:100%;border-collapse:collapse}
    th,td{padding:12px;border-bottom:1px solid #1e293b;text-align:left}
    a{color:#38bdf8}
    .muted{opacity:.8}
    .err{color:#f87171}
  </style>
</head>
<body>
  <div class="card">
    <h1>Angela Skill Submissions</h1>
    <div id="content" class="muted">Loading...</div>
    <p><a href="../submit/">Back to Submit</a></p>
  </div>

  <script type="module">
    import { getSkills } from "../js/api.js";

    const content = document.getElementById("content");

    async function load() {
      try {
        const skills = await getSkills();

        if (!Array.isArray(skills) || !skills.length) {
          content.innerHTML = "<p>No submissions yet.</p>";
          return;
        }

        let html = "<table><tr><th>Skill</th><th>Author</th><th>Score</th><th>Time</th></tr>";
        for (const s of skills.slice().reverse()) {
          html += <tr>
            <td>\</td>
            <td>\</td>
            <td>\</td>
            <td>\</td>
          </tr>;
        }
        html += "</table>";
        content.innerHTML = html;
      } catch (err) {
        content.innerHTML = '<p class="err">Load failed: ' + err.message + '</p>';
      }
    }

    load();
  </script>
</body>
</html>
