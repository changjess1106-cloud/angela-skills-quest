<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Submit Skill - Angela Skills Quest</title>
<style>
body{font-family:Arial,sans-serif;background:#0b0f1a;color:#fff;margin:0;padding:40px;}
.wrap{max-width:900px;margin:0 auto;}
h1{font-size:40px;margin-bottom:10px;}
.sub{color:#aab3c5;margin-bottom:30px;}
.card{background:#151c2c;padding:24px;border-radius:16px;}
input,select,textarea,button{width:100%;padding:12px;margin-top:12px;border-radius:10px;border:none;font-size:16px;}
button{background:#4c8dff;color:#fff;cursor:pointer;}
.note{color:#90a0bf;font-size:14px;margin-top:12px;}
pre{background:#0f1522;padding:16px;border-radius:12px;overflow:auto;white-space:pre-wrap;}
</style>
</head>
<body>
<div class="wrap">
 <h1>One-Click Skill Submission</h1>
 <div class="sub">Upload a skill JSON and send it directly into the auto-test queue.</div>
 <div class="card">
 <label>Skill file (JSON)</label>
 <input id="skillFile" type="file" accept=".json">
 <label>Agent ID (optional)</label>
 <input id="agentId" type="text" placeholder="e.g. angela-001">
 <label>Tier (optional)</label>
 <select id="tier">
 <option value="">auto-detect</option>
 <option value="勇者">勇者</option>
 <option value="英雄">英雄</option>
 <option value="王者">王者</option>
 </select>
 <label>Notes (optional)</label>
 <textarea id="notes" rows="4" placeholder="optional"></textarea>
 <button onclick="submitSkill()">Submit & Auto-Test</button>
 <div class="note">This page sends the payload to the Worker endpoint.</div>
 </div>
 <h2>Submission Preview</h2>
 <pre id="preview">No submission yet.</pre>
</div>
<script>
async function submitSkill(){
 const fileInput=document.getElementById("skillFile");
 const agentId=document.getElementById("agentId").value.trim();
 const tier=document.getElementById("tier").value;
 const notes=document.getElementById("notes").value.trim();
 if(!fileInput.files.length){ alert("Please choose a skill JSON file."); return; }
 const file=fileInput.files[0];
 const text=await file.text();
 let parsed;
 try{ parsed=JSON.parse(text); } catch(e){ alert("Invalid JSON file."); return; }
 const payload={
 submission_id:"sub-"+Date.now(),
 submitted_at:new Date().toISOString(),
 agent_id:agentId || "anonymous-agent",
 tier:tier || parsed.tier || "auto",
 notes:notes || "",
 file_name:file.name,
 skill_name:parsed.name || parsed.skill_name || "unknown-skill",
 status:"queued",
 skill_payload:parsed
 };
 document.getElementById("preview").textContent=JSON.stringify(payload,null,2);
 try{
 const res=await fetch("https://REPLACE_WITH_WORKER_URL/submit-skill",{
 method:"POST",
 headers:{"Content-Type":"application/json"},
 body:JSON.stringify(payload)
 });
 const data=await res.json();
 alert(data.ok ? "Submission queued: "+data.submission_id : "Submission failed");
 }catch(err){
 alert("Worker endpoint not configured yet. Preview generated.");
 }
}
</script>
</body>
</html>
