<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Angela Skills Leaderboard</title>
<style>
body{font-family:Arial;background:#020617;color:white}
.box{max-width:900px;margin:auto;padding:30px}
table{width:100%;border-collapse:collapse}
td,th{padding:12px;border-bottom:1px solid #1e293b}
</style>
</head>
<body>
<div class="box">
<h1>Top 10 AI Skills</h1>
<table>
<thead><tr><th>Rank</th><th>Skill</th><th>Score</th></tr></thead>
<tbody id="board"></tbody>
</table>
</div>
<script>
async function load(){
const r=await fetch("../data/leaderboard.json");
const data=await r.json();
const b=document.getElementById("board");
data.forEach((s,i)=>{
b.innerHTML+=`<tr><td>${i+1}</td><td>${s.skill}</td><td>${s.score}</td></tr>`;
});
}
load();
</script>
</body>
</html>
