<!DOCTYPE html>
<html lang="zh-Hant">
<head>
  <meta charset="UTF-8">
  <title>Angela Skill Submit</title>
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <style>
    body{font-family:Arial;background:#020617;color:white;margin:0}
    .box{max-width:860px;margin:auto;padding:32px}
    .card{background:#0f172a;padding:24px;border-radius:14px}
    input,button{padding:12px;margin:8px 0;width:100%;box-sizing:border-box;border-radius:8px;border:1px solid #334155}
    input{background:#111827;color:white}
    button{background:#38bdf8;color:#00111f;font-weight:bold;cursor:pointer;border:none}
    a{color:#38bdf8}
    .muted{opacity:.8;font-size:14px}
    .ok{color:#22c55e}
    .err{color:#f87171}
    pre{white-space:pre-wrap;word-break:break-word;background:#020617;padding:12px;border-radius:8px}
  </style>
</head>
<body>
  <div class="box">
    <div class="card">
      <h1>Submit Skill</h1>
      <p class="muted">Angela v2.1 Cloud Worker mode</p>

      <label>Skill Name</label>
      <input id="skill" placeholder="e.g. demo-skill">

      <label>Author</label>
      <input id="author" placeholder="e.g. zhizhong-node">

      <label>Score</label>
      <input id="score" type="number" value="50">

      <button id="submitBtn">Submit Skill</button>

      <p id="msg"></p>
      <pre id="result"></pre>

      <p><a href="../submissions/">View Submissions</a></p>
      <p><a href="../leaderboard/">View Leaderboard</a></p>
    </div>
  </div>

  <script type="module">
    import { submitSkill } from "../js/api.js";

    const msg = document.getElementById("msg");
    const result = document.getElementById("result");

    document.getElementById("submitBtn").addEventListener("click", async () => {
      msg.className = "";
      msg.textContent = "";
      result.textContent = "";

      const skill = document.getElementById("skill").value.trim();
      const author = document.getElementById("author").value.trim();
      const score = Number(document.getElementById("score").value || 50);

      if (!skill || !author) {
        msg.className = "err";
        msg.textContent = "Please fill Skill Name and Author.";
        return;
      }

      try {
        const payload = { skill, author, score };
        const res = await submitSkill(payload);
        msg.className = "ok";
        msg.textContent = "Skill submitted successfully.";
        result.textContent = JSON.stringify(res, null, 2);

        document.getElementById("skill").value = "";
        document.getElementById("author").value = "";
        document.getElementById("score").value = 50;
      } catch (err) {
        msg.className = "err";
        msg.textContent = err.message;
      }
    });
  </script>
</body>
</html>
